<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | Energy & Wealth</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 12%, rgba(13,110,253,0.16), transparent 32%),
        radial-gradient(circle at 82% 18%, rgba(124,58,237,0.13), transparent 34%),
        linear-gradient(135deg, #f8fbff, #eef6ff);
      color: #071a33;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
    }
    .card {
      width: min(560px, 100%);
      border: 1px solid #cddceb;
      border-radius: 24px;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 30px 82px rgba(18,69,145,0.14);
      padding: 2rem;
      text-align: center;
      backdrop-filter: blur(16px);
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1;
      letter-spacing: -0.03em;
    }
    p {
      margin: 0.85rem auto 0;
      max-width: 430px;
      color: #405a78;
      font-size: 1rem;
      line-height: 1.6;
      font-weight: 700;
    }
    .actions {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 1.2rem;
    }
    a {
      min-height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, #0d6efd, #6d5dfc);
      color: #fff;
      padding: 0 1.15rem;
      display: inline-grid;
      place-items: center;
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 950;
      box-shadow: 0 18px 38px rgba(13,110,253,0.24);
    }
    a.secondary {
      background: rgba(255,255,255,0.92);
      color: #173251;
      border: 1px solid #cddceb;
      box-shadow: 0 12px 28px rgba(16,38,67,0.08);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Sign in required</h1>
    <p>Access dashboards require a verified Energy & Wealth Intelligence subscription. Complete checkout first, then Stripe will return you to the active access dashboard.</p>
    <div class="actions">
      <a href="/calculator-preview?view=plans">View Plans</a>
      <a class="secondary" href="/calculator-preview">Return to Calculator</a>
    </div>
  </main>
</body>
</html>
